## Tu 

<plot>
    type = heatmap
    file = data/data_heatmap_Tu.txt
    r0 = 0.3r
    r1 = 0.26r
    min   = -1.5
max   = 1.5

stroke_thickness = 0
# color = black
color_mapping = yes

<rules>
  
  <rule>
  condition = var(value) < 0.2
  color = viridis1
  </rule>
  
       <rule>
    condition = var(value) >= 0.2 && var(value) < 0.5
  color = viridis2
  </rule>
   
    <rule>
    condition = var(value) >= 0.5 && var(value) < 0.8
  color = viridis3
  </rule>
  
      <rule>
    condition = var(value) >= 0.8 && var(value) < 1
  color = viridis4
  </rule>
  
        <rule>
    condition = var(value) >= 1 && var(value) < 1.2
  color = viridis6
  </rule>
  
    <rule>
    condition = var(value) >= 1.2 && var(value) < 1.5
  color = viridis7
  </rule>
    
        
    <rule>
    condition = var(value) >= 1.5 && var(value) < 1.8
  color = viridis8
  </rule>
  
    <rule>
    condition = var(value) >= 1.8 && var(value) < 2
  color = viridis9
  </rule>
    
    <rule>
    condition = var(value) > 2 && var(value) <= 3
  color = viridis9
  </rule>
    
        <rule>
    condition = var(value) > 3 && var(value) <= 5
  color = viridis10
  </rule>
    
        <rule>
    condition = var(value) > 5
  color = viridis10
  </rule>
</rules>
</plot>



