


show_ticks          = yes
show_tick_labels    = yes


karyotype = data/karyotype.txt

<ideogram>

<spacing>
default = 0.005r
</spacing>

show_bands = no

radius    = 0.9r
thickness = 80p
fill      = yes
# fill_color = red
stroke_thickness = 2p
stroke_color = black


# Minimum definition for ideogram labels.

show_label       = yes
# see etc/fonts.conf for list of font names
label_font       = default 
label_radius     = 1r + 75p
label_size       = 80
label_parallel   = yes

</ideogram>




<ticks>

radius           = 1r
color            = black
thickness        = 2p

# the tick label is derived by multiplying the tick position
# by 'multiplier' and casting it in 'format':
#
# sprintf(format,position*multiplier)

multiplier       = 1e-4

# %d   - integer
# %f   - float
# %.1f - float with one decimal
# %.2f - float with two decimals
#
# for other formats, see https://perldoc.perl.org/functions/sprintf.html

format           = %d

<tick>
spacing        = 100u
size           = 15p
show_label     = no
label_size     = 20p
label_offset   = 10p
format         = %d
</tick>

</ticks>



